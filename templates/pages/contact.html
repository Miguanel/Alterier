{% extends 'base.html' %}
{% block title %}Kontakt | Atelier{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-6 pt-16 pb-24">
    
    <div class="text-center mb-16 relative">
        <div class="absolute left-1/2 -translate-x-1/2 -top-6 w-12 h-0.5 bg-kolor-czary opacity-50"></div>
        <h1 class="text-4xl md:text-5xl font-serif text-ksiega tracking-wide">Wyślij Kruka</h1>
        <p class="text-tekst-zgaszony mt-6 text-lg">Masz pytanie o zamówienie, współpracę, a może chcesz zamówić coś spersonalizowanego?</p>
    </div>

    <div class="bg-chata p-8 md:p-12 rounded-[3rem] border border-kociolek shadow-xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-kolor-czary/5 to-transparent pointer-events-none"></div>
        
        <form action="#" method="POST" class="space-y-6 relative z-10">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-tekst-zgaszony mb-2 ml-4">Twoje Imię</label>
                    <input type="text" required class="w-full bg-mrok border border-kociolek rounded-full py-4 px-6 text-ksiega focus:outline-none focus:border-kolor-czary transition shadow-sm placeholder-kociolek">
                </div>
                <div>
                    <label class="block text-sm font-bold text-tekst-zgaszony mb-2 ml-4">Adres E-mail</label>
                    <input type="email" required class="w-full bg-mrok border border-kociolek rounded-full py-4 px-6 text-ksiega focus:outline-none focus:border-kolor-czary transition shadow-sm placeholder-kociolek">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-tekst-zgaszony mb-2 ml-4">Wiadomość</label>
                <textarea rows="5" required class="w-full bg-mrok border border-kociolek rounded-[2rem] py-4 px-6 text-ksiega focus:outline-none focus:border-kolor-czary transition shadow-sm resize-none placeholder-kociolek"></textarea>
            </div>

            <div class="text-center pt-4">
                <button type="button" class="bg-kolor-czary hover:bg-kolor-czary-hover text-bg-mrok px-12 py-4 rounded-full font-bold text-lg transition-all shadow-lg hover:shadow-kolor-czary/20">
                    Wyślij wiadomość
                </button>
            </div>
        </form>
    </div>
    
    <div class="text-center mt-12 text-tekst-zgaszony">
        <p>Możesz mnie również znaleźć na Instagramie:</p>
        <a href="#" class="inline-block mt-2 font-serif text-xl text-ksiega hover:text-kolor-czary transition">@twoje.atelier</a>
    </div>
</div>
{% endblock %}
